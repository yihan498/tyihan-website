{{ define "main" }}
<div class="articles-page">
  <div class="page-top">
    <h1>文章</h1>
    <p class="page-subtitle">读书、思考、记录</p>
  </div>
  {{ $articles := .Pages }}
  {{ if $articles }}
  <div class="article-grid">
    {{ range $articles }}
    <div class="article-card">
      <a href="{{ .Permalink }}" class="article-card-img-wrap">
        {{ if .Params.image }}
        <img src="{{ .Params.image }}" class="article-card-img" alt="{{ .Title }}">
        {{ else }}
        <div class="article-card-img article-card-img--placeholder"></div>
        {{ end }}
      </a>
      <div class="article-card-info">
        <span class="article-card-date">{{ .Date.Format "2006-01-02" }}</span>
        <a href="{{ .Permalink }}" class="article-card-title">{{ .Title }}</a>
      </div>
    </div>
    {{ end }}
  </div>
  {{ else }}
  <p style="font-size:14px;color:var(--color-faint);">文章即将更新...</p>
  {{ end }}
</div>
{{ end }}
