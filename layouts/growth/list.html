{{ define "main" }}
<div class="growth-page">
  <div class="growth-header page-top">
    <h1>成长</h1>
    <p class="growth-subtitle">认知、规划与思考的碎片</p>
  </div>

  {{ $entries := where .Site.RegularPages "Section" "growth" }}
  {{ if $entries }}
  <ul class="growth-list">
    {{ range $entries }}
    <li class="growth-item">
      <div class="growth-meta">
        <span class="growth-cat">{{ .Params.category }}</span>
        <span class="growth-date">{{ .Date.Format "2006-01" }}</span>
      </div>
      <div class="growth-body">
        <a href="{{ .Permalink }}" class="growth-title-link">
          <h2 class="growth-title">{{ .Title }}</h2>
        </a>
        <p class="growth-desc">{{ .Summary }}</p>
      </div>
    </li>
    {{ end }}
  </ul>
  {{ else }}
  <p style="font-size:13px;color:#bbb;">内容整理中 ...</p>
  {{ end }}
</div>
{{ end }}
