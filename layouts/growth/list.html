{{ define "main" }}
<div class="growth-page">
  <div class="growth-header page-top">
    <h1>成长</h1>
    <p class="growth-subtitle">认知与规划的体系化积累</p>
  </div>

  <div class="folder-grid">
    {{ range .Sections }}
    <a class="folder-card" href="{{ .Permalink }}">
      <div class="folder-top">
        <div class="folder-tab">{{ .Title }}</div>
      </div>
      <div class="folder-body">
        {{ with .Params.title_en }}<div class="folder-label-en">{{ . }}</div>{{ end }}
        {{ with .Params.description }}<p class="folder-desc">{{ . }}</p>{{ end }}
        <div class="folder-foot">
          {{ $count := len .RegularPages }}
          <span class="folder-count">
            {{ if eq $count 0 }}整理中{{ else }}{{ $count }} 篇{{ end }}
          </span>
          <span class="folder-arrow">→</span>
        </div>
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
